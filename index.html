<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCAST 95/97 Reunion | RSVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; margin: 0; padding: 20px 0; }
        .main-card { background-color: white; border-radius: 32px; width: 95%; max-width: 480px; margin: auto; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header-banner { width: 100%; height: auto; display: block; }
        .form-content { padding: 1.5rem 1.5rem 2rem 1.5rem; }
        .input-card { background: #f8fafc; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
        .label-text { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; display: block; margin-bottom: 4px; }
        select, textarea, input { width: 100%; background: transparent; outline: none; font-size: 16px; font-weight: 600; color: #1e293b; border: none; resize: none; }
        .note-box { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
        .done-btn { background-color: #2563eb; color: white; font-weight: 800; text-transform: uppercase; padding: 1.25rem; border-radius: 18px; width: 100%; transition: all 0.2s; margin-top: 0.5rem; cursor: pointer; }
        .done-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .success-box { background-color: #f0fdf4; border: 1px solid #dcfce7; color: #166534; padding: 1.25rem; border-radius: 18px; text-align: center; font-weight: 700; display: none; margin-top: 1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start">

    <div class="main-card">
        <img src="images/logo.png" alt="CCAST 95/97 Reunion" class="header-banner">

        <div class="form-content">
            <h2 class="text-center text-xl font-black text-blue-900 uppercase tracking-tight mb-6">30th Anniversary RSVP</h2>

            <form id="rsvpForm">
                <div class="input-card">
                    <label class="label-text">Full Name</label>
                    <input type="text" name="name" required placeholder="Your Name">
                </div>

                <div class="flex gap-3">
                    <div class="input-card flex-1">
                        <label class="label-text">Email</label>
                        <input type="email" name="email" required placeholder="email@address.com">
                    </div>
                    <div class="input-card flex-1">
                        <label class="label-text">Phone</label>
                        <input type="tel" name="phone" required placeholder="Phone Number">
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="input-card flex-1">
                        <label class="label-text">Attending?</label>
                        <select name="attendance" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                            <option value="Maybe">Maybe</option>
                        </select>
                    </div>
                    <div class="input-card flex-1">
                        <label class="label-text">Status</label>
                        <select name="partner">
                            <option value="Solo">Solo</option>
                            <option value="+1 Guest">+1 Guest</option>
                        </select>
                    </div>
                </div>

                <div class="input-card">
                    <label class="label-text">Room Setup?</label>
                    <select name="room_preference">
                        <option value="No Room Needed">No Room Needed</option>
                        <option value="Share a Room">Share a Room</option>
                        <option value="Room Alone">Room Alone</option>
                    </select>
                </div>

                <div class="input-card">
                    <label class="label-text">Dietary Restrictions</label>
                    <select name="dietary">
                        <option value="No Dietary Restrictions">No Dietary Restrictions</option>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="Vegan">Vegan</option>
                    </select>
                </div>

                <div class="note-box">
                    <p class="text-xs font-bold text-amber-700 uppercase mb-1">⚠️ NOTE ON DRINKS</p>
                    <p class="text-sm text-amber-900 leading-snug">
                        Water, soft drinks, and <b>Beer</b> are provided. Please bring your own <b>Whiskey or Wine</b> if you wish.
                    </p>
                </div>

                <div class="input-card">
                    <label class="label-text">Drink Preference & Pledge</label>
                    <textarea name="beverage_choice" rows="2" placeholder="What extra drinks are you bringing?"></textarea>
                </div>

                <div class="input-card">
                    <label class="label-text">Any other questions?</label>
                    <textarea name="questions" rows="2" placeholder="Allergies or questions?"></textarea>
                </div>

                <button type="submit" class="done-btn" id="submitBtn">DONE</button>
                <div id="successMsg" class="success-box">✅ RSVP Successful!</div>
            </form>
        </div>
    </div>

    <div class="mt-8 text-center text-white/50 text-[10px] uppercase tracking-widest font-bold">
        <p>ENGINEERED BY FRANK FRU</p>
        <div class="flex gap-4 justify-center mt-2 opacity-50">
            <a href="https://frankfru.com" target="_blank">Portfolio</a>
            <a href="https://github.com/chifru19" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/frank-fru/" target="_blank">LinkedIn</a>
        </div>
    </div>

    <script>
        // Updated Web App URL from Version 13 Deployment
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz_J8vQ-WZxsvwupeeldzuYT0OmsbYWTCUcgU8P3i7zxVNxmgdFnBBlRk7LErV_swDy/exec';
        
        const form = document.forms['rsvpForm'];
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('successMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = 'SENDING...';

            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form),
                mode: 'no-cors' 
            })
            .then(() => {
                btn.style.display = 'none';
                msg.style.display = 'block';
                form.reset();
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerText = 'DONE';
                console.error('Error!', error.message);
                alert('There was an error. Please try again.');
            });
        });
    </script>
</body>
</html>
