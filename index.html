<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCAST 95/97 Reunion RSVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
        }

        .form-container {
            background-color: white;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            overflow: hidden; /* This crops the image to the card's rounded corners */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-banner {
            width: 100%;
            display: block;
            object-fit: cover; /* Ensures the banner fills the space nicely */
        }

        .form-content {
            padding: 1.5rem 1.5rem 2rem 1.5rem;
        }

        .input-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid #e2e8f0;
        }

        .note-box {
            background: #fffbeb;
            border: 1px solid #fef3c7;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .label-text {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            display: block;
        }

        select, textarea {
            width: 100%;
            background: transparent;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            border: none;
            padding-top: 2px;
        }

        .done-btn {
            background-color: #2563eb;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1.25rem;
            border-radius: 18px;
            width: 100%;
            transition: all 0.2s;
        }

        .done-btn:active { transform: scale(0.98); }
        .done-btn:disabled { background-color: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="form-container">
        
        <img src="images/logo.png" alt="CCAST 95/97 Reunion" class="header-banner">

        <div class="form-content">
            <form id="rsvp-form">
                <div class="flex gap-3">
                    <div class="input-card flex-1">
                        <label class="label-text">Attending?</label>
                        <select name="attendance" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                            <option value="Maybe">Maybe</option>
                        </select>
                    </div>
                    <div class="input-card flex-1">
                        <label class="label-text">Status</label>
                        <select name="guest">
                            <option value="Solo">Solo</option>
                            <option value="+1 Guest">+1 Guest</option>
                        </select>
                    </div>
                </div>

                <div class="input-card">
                    <label class="label-text">Room Setup?</label>
                    <select name="room">
                        <option value="No Room Needed">No Room Needed</option>
                        <option value="Share a Room">Share a Room</option>
                        <option value="Room Alone">Room Alone</option>
                    </select>
                </div>

                <div class="input-card">
                    <label class="label-text">Dietary Restrictions</label>
                    <select name="diet">
                        <option value="None">No Dietary Restrictions</option>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="No Fish">No Fish</option>
                        <option value="Vegan">Vegan</option>
                    </select>
                </div>

                <div class="note-box">
                    <p class="text-[10px] font-black uppercase text-amber-700 mb-1 tracking-wider">⚠️ Note on Drinks</p>
                    <p class="text-[11px] text-amber-900 leading-relaxed">
                        Water, soft drinks, and <b>Beer</b> are provided. Please bring your own <b>Whiskey or Wine</b> if you wish.
                    </p>
                </div>

                <div class="input-card">
                    <textarea name="drink_pref" rows="2" placeholder="Drink preferences?"></textarea>
                </div>

                <div class="input-card">
                    <textarea name="allergies" rows="2" placeholder="Allergies or questions?"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="done-btn shadow-lg">DONE</button>
                
                <div id="successMsg" class="hidden mt-4 bg-green-50 border border-green-100 text-green-600 rounded-2xl py-4 flex items-center justify-center gap-2 font-bold text-sm">
                    ✅ RSVP Successful!
                </div>
            </form>

            <p class="text-center text-[9px] text-gray-400 mt-8 uppercase font-bold tracking-widest italic">Engineered by Frank Fru</p>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwqbje4EwU5F1Zu0wCtVOiBX_IMHCoOx-brBRIs5AxyYwaZLynwbRqdBlPhADAM_q0I/exec'
        const form = document.getElementById('rsvp-form')
        const btn = document.getElementById('submitBtn')
        const success = document.getElementById('successMsg')

        form.addEventListener('submit', e => {
          e.preventDefault()
          btn.disabled = true
          btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> SAVING...'
          
          fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                btn.classList.add('hidden')
                success.classList.remove('hidden')
                form.reset()
            })
            .catch(error => {
                btn.disabled = false
                btn.innerHTML = 'DONE'
                alert('Submission failed. Check your internet or script URL.')
            })
        })
    </script>
</body>
</html>
