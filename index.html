<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCAST 95/97 Reunion RSVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
        }

        .label-style {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 4px;
            display: block;
        }

        select, textarea {
            width: 100%;
            background: transparent;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            color: #0f172a;
        }

        .warning-box {
            background: #fffbeb;
            border: 1px solid #fef3c7;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .done-button {
            background-color: #1d4ed8;
            color: white;
            font-weight: 800;
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            transition: all 0.2s;
        }

        .done-button:active { transform: scale(0.97); }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen py-8 px-4">

    <div class="card w-full max-w-md p-6">
        
        <div class="text-center mb-8">
            <img src="images/logo.png" alt="CCAST 95/97" class="w-32 mx-auto mb-4">
            <h1 class="text-2xl font-extrabold text-blue-900 uppercase tracking-tight">30th Anniversary</h1>
            <p class="text-slate-500 font-semibold text-sm">Class Reunion RSVP</p>
        </div>

        <form id="rsvpForm">
            <div class="grid grid-cols-2 gap-3">
                <div class="input-group">
                    <label class="label-style">Attending?</label>
                    <select name="attendance" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                        <option value="Maybe">Maybe</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="label-style">Status</label>
                    <select name="guest">
                        <option value="Solo">Solo</option>
                        <option value="+1 Guest">+1 Guest</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label class="label-style">Room Setup?</label>
                <select name="room">
                    <option value="No Room Needed">No Room Needed</option>
                    <option value="Share a Room">Share a Room</option>
                    <option value="Room Alone">Room Alone</option>
                </select>
            </div>

            <div class="input-group">
                <label class="label-style">Dietary Restrictions</label>
                <select name="diet">
                    <option value="None">None</option>
                    <option value="Vegetarian">Vegetarian</option>
                    <option value="No Fish">No Fish</option>
                    <option value="Vegan">Vegan</option>
                </select>
            </div>

            <div class="warning-box">
                <p class="text-[10px] font-black uppercase text-amber-700 mb-1">⚠️ Note on Drinks</p>
                <p class="text-xs text-amber-900 leading-relaxed">
                    Water, soft drinks, and <b>Beer</b> are provided. Please bring your own <b>Whiskey or Wine</b> if you wish.
                </p>
            </div>

            <div class="input-group">
                <label class="label-style">Drink Preferences</label>
                <textarea name="drink_pref" rows="2" placeholder="What brands do you prefer?"></textarea>
            </div>

            <div class="input-group">
                <label class="label-style">Allergies / Questions</label>
                <textarea name="allergies" rows="2" placeholder="Any specific food allergies?"></textarea>
            </div>

            <button type="submit" class="done-button shadow-lg shadow-blue-200 uppercase tracking-widest">
                Done
            </button>
        </form>

        <p class="text-center text-[9px] font-bold text-slate-300 mt-8 uppercase tracking-widest italic">
            Engineered by Frank Fru
        </p>
    </div>

</body>
</html>
