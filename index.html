<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCAST 95/97 Reunion RSVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
        }

        .form-container {
            background-color: white;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            border: 1px solid #e2e8f0;
        }

        .note-box {
            background: #fffbeb;
            border: 1px solid #fef3c7;
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .label-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            display: block;
            margin-bottom: 2px;
        }

        select, textarea {
            width: 100%;
            background: transparent;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            border: none;
        }

        .done-btn {
            background-color: #2563eb;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1.25rem;
            border-radius: 18px;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .done-btn:active { transform: scale(0.98); }
        .done-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 py-12">

    <div class="form-container">
        
        <div class="flex justify-center mb-6">
            <img src="images/logo.png" alt="CCAST 95/97 Logo" class="w-40 h-auto object-contain">
        </div>

        <form id="rsvp-form">
            <div class="flex gap-3">
                <div class="input-card flex-1">
                    <label class="label-text">Attending?</label>
                    <select name="attendance" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                        <option value="Maybe">Maybe</option>
                    </select>
                </div>
                <div class="input-card flex-1">
                    <label class="label-text">Status</label>
                    <select name="guest">
                        <option value="Solo">Solo</option>
                        <option value="+1 Guest">+1 Guest</option>
                    </select>
                </div>
            </div>

            <div
