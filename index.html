<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 95/97 Reunion | RSVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 py-12">

    <div class="max-w-lg w-full bg-white rounded-[2.5rem] p-8 shadow-2xl">
        <div class="mb-8 text-center md:text-left">
            <h1 class="text-4xl font-black italic uppercase text-slate-900 leading-none tracking-tighter">
                Class Reunion <span class="text-blue-600 text-5xl block">RSVP</span>
            </h1>
            <div class="mt-4 inline-flex items-center bg-blue-50 text-blue-700 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest border border-blue-100">
                📍 Secret 95/97
            </div>
        </div>

        <form id="reunionForm" class="space-y-4">
            <input type="text" name="name" placeholder="Full Name" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none">
            <input type="email" name="email" placeholder="Email Address" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none">
            <input type="tel" name="phone" placeholder="Phone Number" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none">
            
            <div class="grid grid-cols-2 gap-4">
                <select name="attendance" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none">
                    <option value="" disabled selected>Attending?</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="Maybe">Maybe</option>
                </select>
                <select name="partner" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none">
                    <option value="Solo">Solo</option>
                    <option value="Plus One">+1 Guest</option>
                </select>
            </div>

            <select name="room_preference" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none">
                <option value="" disabled selected>Room Setup?</option>
                <option value="Shared">Share a Room</option>
                <option value="Alone">Room Alone</option>
                <option value="Not Needed">No Room Needed</option>
            </select>

            <select name="dietary" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none">
                <option value="none">No Dietary Restrictions</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="no-fish">No Fish (Allergy/Preference)</option>
                <option value="vegan">Vegan</option>
                <option value="other">Other Allergy (Specify below)</option>
            </select>

            <div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl">
                <p class="text-[10px] font-bold uppercase tracking-widest text-amber-700 mb-2">⚠️ Note on Drinks</p>
                <p class="text-xs text-amber-800 leading-relaxed">
                    Water, basic soft drinks, and <strong>Beer</strong> are provided. Please bring your own <strong>Whiskey or Wine</strong> if you wish to drink those, as they will not be supplied.
                </p>
            </div>

            <textarea name="beverage_choice" rows="2" placeholder="What type of soft drink or beer would you prefer? / Other details..." class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none"></textarea>
            <textarea name="questions" rows="2" placeholder="Any questions or specific food allergies?" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none"></textarea>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-lg active:scale-95">
                Confirm RSVP
            </button>
        </form>

        <div id="status" class="hidden mt-6 text-center p-4 rounded-2xl font-bold"></div>
    </div>

    <div class="mt-8 text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">
        Engineered by Praxis Abraham T.
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwqbje4EwU5F1Zu0wCtVOiBX_lMHCoOx-bRBRIs5AxYwaZLynwbRqydBlPhADA-Sfon/exec';
        const form = document.getElementById('reunionForm');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Processing...";
            
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new FormData(form)
            })
            .then(() => {
                status.innerText = "✅ RSVP Successful!";
                status.className = "mt-6 text-center p-4 rounded-2xl font-bold bg-green-50 text-green-600";
                status.classList.remove('hidden');
                form.reset();
                btn.innerText = "Done";
                btn.disabled = false;
            })
            .catch(error => {
                status.innerText = "Error. Please try again.";
                status.className = "mt-6 text-center p-4 rounded-2xl font-bold bg-red-50 text-red-600";
                status.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Try Again";
            });
        });
    </script>
</body>
</html>
