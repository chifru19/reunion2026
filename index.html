<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Class Reunion 2026 | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl p-10 shadow-2xl">
        <h1 class="text-3xl font-black italic uppercase text-slate-900 mb-6">Reunion <span class="text-blue-600">2026</span></h1>
        <form id="reunionForm" class="space-y-4">
            <input type="password" id="secretCode" placeholder="Class Secret" required class="w-full bg-slate-50 border p-3 rounded-xl">
            <input type="text" name="name" placeholder="Full Name" required class="w-full bg-slate-50 border p-3 rounded-xl">
            <input type="email" name="email" placeholder="Email" required class="w-full bg-slate-50 border p-3 rounded-xl">
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase">Register</button>
        </form>
        <div id="status" class="hidden mt-4 text-center font-bold"></div>
    </div>

    <script>
        const scriptURL = 'YOUR_GOOGLE_WEB_APP_URL_HERE'; // <--- PASTE YOUR LINK HERE
        const SECRET = "95/97"; // <--- SET YOUR SECRET HERE

        document.getElementById('reunionForm').addEventListener('submit', e => {
            e.preventDefault();
            if(document.getElementById('secretCode').value !== SECRET) return alert("Wrong Code!");
            
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(() => alert("Registration Success!"))
                .catch(err => console.error(err));
        });
    </script>
</body>
</html>
