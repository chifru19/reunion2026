<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCAST 95/97 - 30th Anniversary Reunion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .form-card { background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #1e3a8a; color: white; transition: background 0.3s; }
        .btn-primary:hover { background-color: #172554; }
    </style>
</head>
<body class="min-h-screen py-12 px-4 flex flex-col items-center">

    <div class="mb-8 text-center">
        <img src="images/logo.png" alt="CCAST 95/97 Logo" class="w-64 md:w-80 mx-auto mb-4 drop-shadow-lg">
        <h1 class="text-3xl font-bold text-blue-900">Class Reunion RSVP</h1>
        <p class="text-gray-600 mt-2">📍 Secret 95/97 | Kribi, Cameroon</p>
    </div>

    <div class="form-card w-full max-w-lg p-8">
        <form id="rsvpForm" class="space-y-6">
            
            <div>
                <label class="block font-semibold mb-2">Attending?</label>
                <select name="attendance" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    <option value="">Select an option</option>
                    <option value="Yes">Yes, I'm coming!</option>
                    <option value="No">No, I can't make it</option>
                    <option value="Maybe">Maybe</option>
                </select>
            </div>

            <div>
                <label class="block font-semibold mb-2">Guest Status</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2"><input type="radio" name="partner" value="Solo" checked> Solo</label>
                    <label class="flex items-center gap-2"><input type="radio" name="partner" value="+1 Guest"> +1 Guest</label>
                </div>
            </div>

            <div>
                <label class="block font-semibold mb-2">Room Setup?</label>
                <select name="room" class="w-full border p-3 rounded-lg">
                    <option value="No Room Needed">No Room Needed</option>
                    <option value="Share a Room">Share a Room</option>
                    <option value="Room Alone">Room Alone</option>
                </select>
            </div>

            <div>
                <label class="block font-semibold mb-2">Dietary Restrictions</label>
                <select name="diet" class="w-full border p-3 rounded-lg">
                    <option value="None">No Dietary Restrictions</option>
                    <option value="Vegetarian">Vegetarian</option>
                    <option value="No Fish">No Fish</option>
                    <option value="Vegan">Vegan</option>
                </select>
            </div>

            <div class="bg-amber-50 border-l-4 border-amber-400 p-4 text-sm text-amber-800">
                <strong>⚠️ Note on Drinks:</strong> Water, soft drinks, and Beer provided. Please bring your own Whiskey or Wine if you wish.
            </div>

            <button type="submit" id="submitBtn" class="w-full btn-primary font-bold py-3 rounded-lg shadow-md">
                Confirm RSVP
            </button>
        </form>
    </div>

    <footer class="mt-8 text-gray-500 text-sm italic">
        Engineered by Frank Fru
    </footer>

    <script>
        const form = document.getElementById('rsvpForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Saving...";
            
            // Logic to connect to your Google Apps Script URL would go here
            alert("RSVP Recorded Locally! Ensure your Script URL is connected.");
            
            btn.disabled = false;
            btn.innerText = "Confirm RSVP";
        });
    </script>

</body>
</html>
