<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reunion 2026 | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] p-8 shadow-2xl overflow-hidden relative">
        
        <div class="mb-8">
            <h1 class="text-4xl font-black italic uppercase text-slate-900 leading-none">
                Reunion <span class="text-blue-600">2026</span>
            </h1>
            <p class="text-slate-500 mt-2 font-medium">Please verify and register below.</p>
        </div>

        <form id="reunionForm" class="space-y-4">
            <div>
                <label class="text-xs font-bold uppercase text-slate-400 ml-1">Class Secret</label>
                <input type="password" id="secretCode" placeholder="••••" required 
                    class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all font-mono text-lg">
            </div>

            <hr class="border-slate-100 my-4">

            <input type="text" name="name" placeholder="Full Name" required 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">
            
            <input type="email" name="email" placeholder="Email Address" required 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">
            
            <input type="tel" name="phone" placeholder="Phone Number" required 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">

            <button type="submit" id="submitBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-
