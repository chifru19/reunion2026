<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Reset 2026 | RSVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 py-12">

    <div class="max-w-lg w-full bg-white rounded-[2.5rem] p-8 shadow-2xl relative">
        <div class="mb-8 text-center md:text-left">
            <h1 class="text-4xl font-black italic uppercase text-slate-900 leading-none tracking-tighter">
                The Legacy <span class="text-blue-600 text-5xl block">Reset 2026</span>
            </h1>
            <p class="text-slate-500 mt-2 font-bold uppercase tracking-wide text-sm">Reunion Attendance RSVP</p>
        </div>

        <form id="reunionForm" class="space-y-4">
            <div>
                <label class="text-xs font-bold uppercase text-slate-400 ml-1">Class Secret</label>
                <input type="password" id="accessSecret" placeholder="••••" required 
                    class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none text-center font-mono">
            </div>

            <hr class="border-slate-100 my-2">

            <input type="text" name="name" placeholder="Full Name" required 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none">
            
            <input type="email" name="Email" placeholder="Email Address" required 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none">

            <input type="tel" name="Phone" placeholder="Phone Number" required 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 ml-1">Attending?</label>
                    <select name="Attendance" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none mt-1">
                        <option value="" disabled selected>Select...</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                        <option value="Maybe">Maybe</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 ml-1">+ Guest?</label>
                    <select name="partner" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none mt-1">
                        <option value="Solo">Solo</option>
                        <option value="Plus One">+1 Guest</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 ml-1">Hotel Needed?</label>
                    <select name="hotel" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none mt-1">
                        <option value="None">No</option>
                        <option value="Needed">Yes</option>
                        <option value="Shared">Shared</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 ml-1">Suit Needed?</label>
                    <select name="suit" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none appearance-none mt-1">
                        <option value="Own">Have Own</option>
                        <option value="Needed">Need One</option>
                        <option value="Shared">Shared</option>
                    </select>
                </div>
            </div>

            <textarea name="comments" rows="2" placeholder="Drink preferences or special requests..." 
                class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none"></textarea>

            <button type="submit" id="submitBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-lg active:scale-95">
                Confirm RSVP
            </button>
        </form>

        <div id="status" class="hidden mt-6 text-center p-4 rounded-2xl font-bold"></div>
    </div>

    <script>
        // Make sure you have your latest deployment URL here
        const scriptURL = 'PASTE_YOUR_NEW_LINK_HERE';
        const CLASS_SECRET = "95/97"; 

        const form = document.getElementById('reunionForm');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        form.addEventListener('submit', e => {
            e.preventDefault();
            if (document.getElementById('accessSecret').value !== CLASS_SECRET) {
                alert("❌ Invalid Secret.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";
            status.classList.remove('hidden');
            status.innerText = "Sending your RSVP...";
            status.className = "mt-6 text-center p-4 rounded-2xl font-bold bg-blue-50 text-blue-600";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    status.innerText = "✅ RSVP Successful!";
                    status.className = "mt-6 text-center p-4 rounded-2xl font-bold bg-green-50 text-green-600";
                    form.reset();
                    btn.innerText = "Done";
                })
                .catch(error => {
                    status.innerText = "Error. Please try again.";
                    status.className = "mt-6 text-center p-4 rounded-2xl font-bold bg-red-50 text-red-600";
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                });
        });
    </script>
</body>
</html>
